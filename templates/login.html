{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}

<div class="container">
    
    <form action="{{ url_for('login') }}" method="post" enctype="multipart/form-data" class="auth-form mt-5 p-5 border border-white rounded">
        <h1 class="text-white text-center mb-4 fw-bold">Welcome Back</h1>

        <div class="form-group">
            <label for="email" class="form-label text-white">Email:</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group   mt-3">
            <label for="password" class="form-label text-white">Password:</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary mt-4 w-100 bg-warning fw-bold text-dark">Login</button>
    </form>
</div>

{% endblock %}
