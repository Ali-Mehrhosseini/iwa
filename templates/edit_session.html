{% extends "base.html" %}

{% block title %}Edit Session{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark text-warning">
                <h1 class="h4 mb-0">Edit Quest Session</h1>
            </div>

            <div class="card-body">
                <form method="post" action="{{ url_for('edit_session', session_id=s.id) }}">
                    <div class="mb-3">
                        <label for="day" class="form-label">Day</label>
                        <select id="day" name="day" class="form-select" required>
                            {% for day in days %}
                                <option value="{{ day }}" {% if s.day == day %}selected{% endif %}>
                                    {{ day }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="start_time" class="form-label">Starting Time</label>
                        <input
                            type="time"
                            id="start_time"
                            name="start_time"
                            class="form-control"
                            value="{{ s.start_time }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <select id="location" name="location" class="form-select" required>
                            {% for location in locations %}
                                <option value="{{ location }}" {% if s.location == location %}selected{% endif %}>
                                    {{ location }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('session_detail', session_id=s.id) }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-warning fw-semibold text-dark">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
