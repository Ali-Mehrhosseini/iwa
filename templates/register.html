{% extends "base.html" %}

{% block title %}Register{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="container">
    <form action="{{ url_for('register') }}" method="post" enctype="multipart/form-data" class="mt-5 p-5 black-border">
        <div class="form-group">
            <label for="name" class="form-label">Name:</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group mt-3">
            <label for="lastName" class="form-label">LastName:</label>
            <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Enter your last name" required>
        </div>
        <div class="form-group mt-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group mt-3">
            <label for="password" class="form-label ">Password:</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="form-group mt-3">
            <label for="confirm_password" class="form-label">Confirm Password:</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
        </div>
        <div class="form-group mt-3">
            <label class="form-label" for="profile_img">Upload Profile Image</label>
            <input type="file" class="form-control" id="profile_img" name="profile_img" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary mt-3">Register</button>
    </form>
</div>



{% endblock %}
