{% extends "base.html" %}

{% block title %}About{% endblock %}

{% block content %}
<h1 class="text-center mt-5 p-5 border border-primary">About Us</h1>
<ul>
    {% for item in items %}
        <li><a href="#">{{ item | e }}</a></li>
    {% endfor %}
</ul>

<form method="post" action="/about">
    <div class="form-group">
        <label for="item" class="form-label">Email:</label>
        <input type="email" class="form-control" id="item" name="item" placeholder="Enter your email" required>
    </div>
    <button type="submit" class="btn btn-primary mt-3">Send</button>
</form>
{% endblock %}
